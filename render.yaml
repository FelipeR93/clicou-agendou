services:
  - type: web
    name: clicou-agendou
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clicou-agendou-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        value: https://clicou-agendou.onrender.com/api/auth
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NODE_ENV
        value: production

databases:
  - name: clicou-agendou-db
    databaseName: clicouagendou
    user: clicouagendou
    plan: free
